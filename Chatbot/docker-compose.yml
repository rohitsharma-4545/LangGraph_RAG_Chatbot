services:
  api:
    build: .
    container_name: rag_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db

  worker:
    build: .
    container_name: rag_worker
    command: celery -A app.worker.celery_worker.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db

  redis:
    image: redis:7
    container_name: rag_redis
    ports:
      - "6379:6379"

volumes:
  chroma_data:
